name: fasting_timer
description: A premium Intermittent Fasting Timer app with offline support.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  cupertino_icons: ^1.0.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.66.0
  share_plus: ^7.2.1
  path_provider: ^2.1.2
  flutter_local_notifications: ^17.0.0
  google_fonts: ^6.1.0
  screenshot: ^3.0.0
  intl: ^0.19.0
  confetti: ^0.8.0

  timezone: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
